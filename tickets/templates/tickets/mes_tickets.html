<!DOCTYPE html>
<html>

<head>
    <title>Mes tickets</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f2f2f2;
        }

        .ouvert {
            color: orange;
            font-weight: bold;
        }

        .en_cours {
            color: blue;
            font-weight: bold;
        }

        .attente_pieces {
            color: purple;
            font-weight: bold;
        }

        .resolu {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>📋 Mes tickets</h1>

    <a href="{% url 'creer_ticket' %}">+ Nouveau ticket</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Équipement</th>
                <th>Statut</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for ticket in tickets %}
            <tr>
                <td>#{{ ticket.id }}</td>
                <td>{{ ticket.titre }}</td>
                <td>{{ ticket.equipement.nom }}</td>
                <td class="{{ ticket.statut }}">{{ ticket.get_statut_display }}</td>
                <td>{{ ticket.date_creation|date:"d/m/Y H:i" }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5">Aucun ticket créé.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
