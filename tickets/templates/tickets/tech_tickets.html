<!DOCTYPE html>
<html>

<head>
    <title>Mes tickets à traiter</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f2f2f2;
        }

        button {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>🔧 Tickets à traiter</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Équipement</th>
                <th>Statut</th>
                <th>Créateur</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for ticket in tickets %}
            <tr>
                <td>#{{ ticket.id }}</td>
                <td>{{ ticket.titre }}</td>
                <td>{{ ticket.equipement.nom }}</td>
                <td>{{ ticket.get_statut_display }}</td>
                <td>{{ ticket.createur.username }}</td>
                <td><a href="{% url 'changer_statut' ticket.id %}"><button>Traiter</button></a></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6">Aucun ticket à traiter.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
